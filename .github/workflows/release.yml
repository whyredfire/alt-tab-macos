name: Build and release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: AltTab
  XCODE_BUILD_PATH: DerivedData/Build/Products/Release

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - name: Read app version from changelog
        run: |
          version="$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+' changelog.md | head -1)"
          if [[ -z "$version" ]]; then echo "could not determine version from changelog.md" >&2; exit 1; fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "Building version $version"

      - name: Select newest installed Xcode
        run: |
          latest="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)"
          if [[ -n "$latest" ]]; then sudo xcode-select -s "$latest/Contents/Developer"; fi
          xcodebuild -version

      - name: Configure ad-hoc signing and version
        run: |
          cat > config/local.xcconfig <<EOF
          CURRENT_PROJECT_VERSION = ${{ env.VERSION }}
          APPCENTER_SECRET =
          CODE_SIGN_STYLE = Manual
          CODE_SIGN_IDENTITY = -
          DEVELOPMENT_TEAM =
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS = NO
          OTHER_CODE_SIGN_FLAGS = --timestamp=none
          EOF

      - name: Build Release
        run: |
          set -o pipefail
          xcodebuild \
            -project alt-tab-macos.xcodeproj \
            -scheme Release \
            -configuration Release \
            -derivedDataPath DerivedData \
            | scripts/xcbeautify
          file "$XCODE_BUILD_PATH/$APP_NAME.app/Contents/MacOS/$APP_NAME"

      - name: Zip app
        run: |
          cd "$XCODE_BUILD_PATH"
          ditto -c -k --keepParent "$APP_NAME.app" "$APP_NAME-$VERSION.zip"

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.VERSION }}
          name: AltTab ${{ env.VERSION }} (fork)
          fail_on_unmatched_files: true
          files: ${{ env.XCODE_BUILD_PATH }}/${{ env.APP_NAME }}-${{ env.VERSION }}.zip
          body: |
            Ad-hoc signed fork build of AltTab (not notarized).

            **First launch:** macOS Gatekeeper will warn because this build isn't
            notarized. Either right-click the app and choose **Open**, or run:

            ```
            xattr -cr /Applications/AltTab.app
            ```
